<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <defs>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0a0a0a"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-strong">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>
  <rect width="64" height="64" rx="14" fill="none" stroke="#00ff41" stroke-width="1" opacity="0.3"/>

  <!-- Brain outline -->
  <path d="M32 14 C24 14 18 20 18 28 C18 32 20 35 23 37 L23 42 C23 44 25 46 27 46 L29 46 L29 50 C29 52 31 54 33 54 C35 54 37 52 37 50 L37 46 L39 46 C41 46 43 44 43 42 L43 37 C46 35 48 32 48 28 C48 20 42 14 34 14" fill="none" stroke="#00ff41" stroke-width="1.8" stroke-linecap="round" opacity="0.6"/>

  <!-- Neural network nodes -->
  <!-- Center node -->
  <circle cx="32" cy="30" r="4" fill="#00ff41" opacity="0.9" filter="url(#glow-strong)"/>
  <circle cx="32" cy="30" r="2" fill="#ffffff" opacity="0.8"/>

  <!-- Left nodes -->
  <circle cx="22" cy="24" r="3" fill="#00ff41" opacity="0.8" filter="url(#glow)"/>
  <circle cx="22" cy="24" r="1.5" fill="#ffffff" opacity="0.7"/>

  <circle cx="20" cy="34" r="2.5" fill="#00ff41" opacity="0.7" filter="url(#glow)"/>
  <circle cx="20" cy="34" r="1.2" fill="#ffffff" opacity="0.6"/>

  <circle cx="26" cy="42" r="2" fill="#00ff41" opacity="0.6" filter="url(#glow)"/>

  <!-- Right nodes -->
  <circle cx="42" cy="24" r="3" fill="#00ff41" opacity="0.8" filter="url(#glow)"/>
  <circle cx="42" cy="24" r="1.5" fill="#ffffff" opacity="0.7"/>

  <circle cx="44" cy="34" r="2.5" fill="#00ff41" opacity="0.7" filter="url(#glow)"/>
  <circle cx="44" cy="34" r="1.2" fill="#ffffff" opacity="0.6"/>

  <circle cx="38" cy="42" r="2" fill="#00ff41" opacity="0.6" filter="url(#glow)"/>

  <!-- Top nodes -->
  <circle cx="28" cy="18" r="2" fill="#00ff41" opacity="0.6" filter="url(#glow)"/>
  <circle cx="36" cy="18" r="2" fill="#00ff41" opacity="0.6" filter="url(#glow)"/>

  <!-- Bottom node -->
  <circle cx="32" cy="48" r="2.5" fill="#00ff41" opacity="0.7" filter="url(#glow)"/>
  <circle cx="32" cy="48" r="1.2" fill="#ffffff" opacity="0.6"/>

  <!-- Connections (neural pathways) -->
  <line x1="32" y1="30" x2="22" y2="24" stroke="#00ff41" stroke-width="1" opacity="0.5"/>
  <line x1="32" y1="30" x2="42" y2="24" stroke="#00ff41" stroke-width="1" opacity="0.5"/>
  <line x1="32" y1="30" x2="20" y2="34" stroke="#00ff41" stroke-width="0.8" opacity="0.4"/>
  <line x1="32" y1="30" x2="44" y2="34" stroke="#00ff41" stroke-width="0.8" opacity="0.4"/>
  <line x1="32" y1="30" x2="28" y2="18" stroke="#00ff41" stroke-width="0.8" opacity="0.4"/>
  <line x1="32" y1="30" x2="36" y2="18" stroke="#00ff41" stroke-width="0.8" opacity="0.4"/>
  <line x1="32" y1="30" x2="26" y2="42" stroke="#00ff41" stroke-width="0.8" opacity="0.4"/>
  <line x1="32" y1="30" x2="38" y2="42" stroke="#00ff41" stroke-width="0.8" opacity="0.4"/>
  <line x1="32" y1="30" x2="32" y2="48" stroke="#00ff41" stroke-width="0.8" opacity="0.4"/>
  <line x1="22" y1="24" x2="28" y2="18" stroke="#00ff41" stroke-width="0.6" opacity="0.3"/>
  <line x1="42" y1="24" x2="36" y2="18" stroke="#00ff41" stroke-width="0.6" opacity="0.3"/>
  <line x1="20" y1="34" x2="26" y2="42" stroke="#00ff41" stroke-width="0.6" opacity="0.3"/>
  <line x1="44" y1="34" x2="38" y2="42" stroke="#00ff41" stroke-width="0.6" opacity="0.3"/>
  <line x1="26" y1="42" x2="32" y2="48" stroke="#00ff41" stroke-width="0.6" opacity="0.3"/>
  <line x1="38" y1="42" x2="32" y2="48" stroke="#00ff41" stroke-width="0.6" opacity="0.3"/>

  <!-- Terminal-style prompt element at bottom -->
  <rect x="20" y="56" width="24" height="3" rx="1.5" fill="#00ff41" opacity="0.3"/>
  <rect x="22" y="56.5" width="8" height="2" rx="1" fill="#00ff41" opacity="0.7" filter="url(#glow)"/>
</svg>